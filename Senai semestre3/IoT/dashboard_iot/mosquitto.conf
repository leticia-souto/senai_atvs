# mosquitto.conf — Configuração do Broker
# ─────────────────────────────────────────────────────────────────
# Copie este arquivo para:
#   C:\Program Files\mosquitto\mosquitto.conf
#
# Após copiar, reinicie o serviço:
#   net stop mosquitto
#   net start mosquitto

# ── Porta para o Pico 2W (TCP direto) ────────────────────────────
listener 1883
allow_anonymous true      # sem usuário/senha (só para testes)

# ── Porta para o dashboard no navegador (WebSocket) ───────────────
# O browser não faz TCP puro — precisa de WebSocket
# Sem "protocol websockets" o browser não consegue conectar
listener 8000
protocol websockets
allow_anonymous true

# ── Log no terminal ───────────────────────────────────────────────
log_type all              # mostra conexões e mensagens em tempo real
