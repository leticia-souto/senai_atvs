<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />
    <title>TechFood - Cadastrar Prato</title>
  </head>
  <body>
 
    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor &amp; Saber</h1>
      <p id="boas-vindas">Carregando...</p>
 
      <input type="checkbox" id="bt_menu" />
      <label for="bt_menu" id="label-menu" aria-label="Abrir menu">&#9776;</label>
 
      <nav id="menu" role="navigation" aria-label="Menu principal">
        <ul>
          <li><a href="index.html">Cardápio</a></li>
          <li><a href="pedidos.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html" class="ativo">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>
 
    <main>
      <section id="secao-cadastro">
        <h2 class="titulo-secao">&#127859; Cadastrar Novo Prato</h2>
 
        <!--
          Toast de feedback — substitui alert() nativo.
          Exibido por mostrarToast() no cadastro.js.
          Classes "sucesso" ou "erro" mudam a cor via CSS.
        -->
        <div id="toast-cadastro" class="toast" aria-live="polite"></div>
 
        <div id="card-cadastro">
 
          <!-- COLUNA ESQUERDA: foto -->
          <div id="area-foto">
            <div id="preview-container">
              <img
                id="preview-imagem"
                src=""
                alt="Preview da foto do prato"
                style="display: none;"
              />
              <div id="placeholder-foto">
                <span>&#128247;</span>
                <p>Clique para escolher a foto</p>
              </div>
            </div>
 
            <!--
              Input file oculto — acionado pelo clique no preview.
              Aceita apenas imagens. O cadastro.js lê o arquivo,
              converte para base64 via FileReader e exibe o preview.
            -->
            <input
              type="file"
              id="input-foto"
              accept="image/*"
              style="display: none;"
              aria-label="Selecionar foto do prato"
            />
 
            <button type="button" id="btn-escolher-foto" class="btn-foto">
              &#128247; Escolher Foto
            </button>
 
            <p id="info-foto" class="info-campo">
              JPG, PNG ou WEBP &bull; máx. 5 MB
            </p>
          </div>
 
          <!-- COLUNA DIREITA: campos do formulário -->
          <div id="area-campos">
 
            <div class="campo-grupo">
              <label for="input-nome">Nome do Prato <span class="obrigatorio">*</span></label>
              <input
                type="text"
                id="input-nome"
                placeholder="Ex: Pizza 4 Queijos"
                maxlength="100"
                autocomplete="off"
              />
            </div>
 
            <div class="campo-grupo">
              <label for="input-descricao">Descrição</label>
              <textarea
                id="input-descricao"
                placeholder="Ingredientes, diferenciais, observações..."
                rows="3"
                maxlength="300"
              ></textarea>
              <span id="contador-descricao" class="contador-chars">0 / 300</span>
            </div>
 
            <div class="linha-dupla">
              <div class="campo-grupo">
                <label for="input-preco">Preço (R$) <span class="obrigatorio">*</span></label>
                <input
                  type="number"
                  id="input-preco"
                  placeholder="0,00"
                  min="0"
                  step="0.01"
                />
              </div>
 
              <div class="campo-grupo">
                <label for="input-categoria">Categoria <span class="obrigatorio">*</span></label>
                <select id="input-categoria">
                  <option value="">Selecione...</option>
                  <option value="Massas">🍕 Massas</option>
                  <option value="Sobremesas">🎂 Sobremesas</option>
                  <option value="Bebidas">🥤 Bebidas</option>
                </select>
              </div>
            </div>
 
            <div class="btn-cadastro-grupo">
              <button type="button" id="btn-limpar-form" class="btn-secundario">
                &#128465; Limpar
              </button>
              <button type="button" id="btn-cadastrar" class="btn-principal">
                &#10003; Cadastrar Prato
              </button>
            </div>
 
          </div>
        </div>
      </section>
    </main>
 
    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
        <p>Av. das Nações, 1500</p>
      </div>
      <p id="data-hora-footer"></p>
    </footer>
 
    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/cadastro.js"></script>
  </body>
</html>
